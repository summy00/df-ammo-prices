<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>子弹定价 Agent</title>
<style>
:root {
  --bg: #f5f6f8;
  --fg: #1f2937;
  --muted: #6b7280;
  --border: #d1d5db;
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --warn-bg: #fff4e5;
  --warn-fg: #9a3412;
  --error: #b91c1c;
  --success: #047857;
  --grade-1: #9ca3af;
  --grade-2: #16a34a;
  --grade-3: #2563eb;
  --grade-4: #9333ea;
  --grade-5: #d97706;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
               "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  background: var(--bg); color: var(--fg);
  font-size: 14px; line-height: 1.5;
}
.page-header {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 16px 24px;
}
.page-header h1 { margin: 0 0 12px 0; font-size: 18px; font-weight: 600; }
.config-row {
  display: grid; grid-template-columns: 1.2fr 1.2fr 1fr auto;
  gap: 12px; align-items: end;
}
.config-row label, .hint-label {
  display: flex; flex-direction: column; gap: 4px;
  font-size: 12px; color: var(--muted);
}
.config-row input, .hint-label input {
  padding: 6px 10px; border: 1px solid var(--border);
  border-radius: 4px; font-size: 13px;
  background: #fff; color: var(--fg); font-family: inherit;
}
.config-row input:focus, .hint-label input:focus {
  outline: 2px solid var(--primary); outline-offset: -1px;
  border-color: var(--primary);
}
button {
  padding: 7px 14px; border: 1px solid var(--border);
  border-radius: 4px; background: #fff; color: var(--fg);
  font-size: 13px; cursor: pointer; font-family: inherit;
}
button:hover { background: #f3f4f6; }
button.primary-button {
  background: var(--primary); color: #fff;
  border-color: var(--primary); font-weight: 500;
}
button.primary-button:hover {
  background: var(--primary-hover); border-color: var(--primary-hover);
}
button:disabled { opacity: 0.5; cursor: not-allowed; }
.banner {
  padding: 10px 24px; font-size: 13px;
  background: #ecfdf5; color: var(--success);
  border-bottom: 1px solid #a7f3d0;
}
.banner.warn {
  background: var(--warn-bg); color: var(--warn-fg);
  border-bottom-color: #fed7aa;
}
main {
  max-width: 1024px; margin: 0 auto; padding: 24px;
  display: grid; gap: 24px;
}
.paste-section { display: grid; gap: 12px; }
.paste-zone {
  border: 2px dashed var(--border); border-radius: 8px;
  padding: 32px; text-align: center; background: #fff;
  min-height: 180px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  cursor: pointer;
}
.paste-zone:focus, .paste-zone.dragover {
  outline: none; border-color: var(--primary);
  background: #eff6ff;
}
.paste-hint { margin: 0; color: var(--muted); }
.thumbnail {
  max-width: 100%; max-height: 320px;
  border-radius: 4px; border: 1px solid var(--border);
}
.paste-meta { font-size: 12px; color: var(--muted); }
.status { font-size: 13px; color: var(--muted); min-height: 20px; }
.status.error { color: var(--error); }
.status.busy { color: var(--primary); }
.results-section {
  background: #fff; border: 1px solid var(--border);
  border-radius: 8px; padding: 16px;
}
.results-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.results-table th, .results-table td {
  padding: 8px 10px; text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.results-table th {
  font-weight: 600; background: #f9fafb;
  color: var(--muted); font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.results-table td.numeric, .results-table th.numeric {
  text-align: right; font-variant-numeric: tabular-nums;
}
.results-table tr.unmatched { background: #fff7ed; color: var(--warn-fg); }
.grade-badge {
  display: inline-block; padding: 2px 8px;
  border-radius: 999px; font-size: 11px;
  color: #fff; font-weight: 500; margin-right: 4px;
}
.grade-badge.g1 { background: var(--grade-1); }
.grade-badge.g2 { background: var(--grade-2); }
.grade-badge.g3 { background: var(--grade-3); }
.grade-badge.g4 { background: var(--grade-4); }
.grade-badge.g5 { background: var(--grade-5); }
.results-table select, .results-table input[type="number"] {
  padding: 4px 6px; border: 1px solid var(--border);
  border-radius: 3px; font-size: 13px;
  background: #fff; font-family: inherit;
}
.results-table select.match-select { max-width: 320px; }
.results-table input[type="number"] { width: 80px; text-align: right; }
.total-label { text-align: right; font-weight: 600; padding-right: 12px; }
.total-cell {
  text-align: right; font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-size: 16px; color: var(--primary);
}
.raw-response { margin-top: 16px; font-size: 12px; }
.raw-response summary { cursor: pointer; color: var(--muted); user-select: none; }
.raw-response pre {
  margin-top: 8px; padding: 12px;
  background: #f3f4f6; border-radius: 4px;
  overflow-x: auto; font-size: 12px;
  max-height: 360px; overflow-y: auto;
}
</style>
</head>
<body>
<header class="page-header">
  <h1>子弹定价 Agent</h1>
  <div class="config-row">
    <label>API Key
      <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
    </label>
    <label>Base URL（可选）
      <input type="text" id="base-url" placeholder="https://api.anthropic.com" autocomplete="off">
    </label>
    <label>模型
      <input type="text" id="model" placeholder="claude-opus-4-7" autocomplete="off">
    </label>
    <button type="button" id="forget-key">忘掉密钥</button>
  </div>
</header>

<div id="freshness-banner" class="banner" hidden></div>

<main>
  <section class="paste-section">
    <div id="paste-zone" class="paste-zone" tabindex="0">
      <p class="paste-hint">Ctrl+V 粘贴游戏截图，或拖入图片，或点击此处选择文件</p>
      <img id="thumbnail" class="thumbnail" alt="" hidden>
      <div id="paste-meta" class="paste-meta"></div>
    </div>
    <input type="file" id="file-picker" accept="image/*" hidden>

    <label class="hint-label">颜色提示（可选，从左到右，例："金 紫 紫"）
      <input type="text" id="hint" placeholder="灰 绿 蓝 紫 金">
    </label>

    <button type="button" id="compute" class="primary-button">计算</button>
    <div id="status" class="status"></div>
  </section>

  <section id="results-section" class="results-section" hidden>
    <table id="results-table" class="results-table">
      <thead>
        <tr>
          <th>格</th><th>匹配</th><th>等级</th>
          <th class="numeric">单价</th><th class="numeric">数量</th><th class="numeric">小计</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
      <tfoot>
        <tr>
          <td colspan="5" class="total-label">总价</td>
          <td id="total-cell" class="total-cell">0</td>
        </tr>
      </tfoot>
    </table>
    <details id="raw-response" class="raw-response">
      <summary>原始响应</summary>
      <pre id="raw-response-pre"></pre>
    </details>
  </section>
</main>

<script>
// 子弹定价 Agent —— 单文件版本（数据 + UI + 调用逻辑全 inline）
// 调 Anthropic API 用原生 fetch（不依赖 SDK），可直接 file:// 双击打开。
// 价格刷新：跑 node scrape.mjs，它会同步重写本文件中 <script id="ammo-data"> 块。

(function () {
  "use strict";

  const STORAGE_KEY_API = "anthropic_api_key";
  const STORAGE_KEY_BASE = "anthropic_base_url";
  const STORAGE_KEY_MODEL = "anthropic_model";
  const DEFAULT_MODEL = "claude-opus-4-7";
  const FRESHNESS_LIMIT_MS = 24 * 60 * 60 * 1000;

  const GRADE_LABELS = { 1: "灰", 2: "绿", 3: "蓝", 4: "紫", 5: "金" };
  const HINT_TO_GRADE = { 灰: 1, 白: 1, 绿: 2, 蓝: 3, 紫: 4, 金: 5, 黄: 5 };

  const priceFormatter = new Intl.NumberFormat("zh-CN");

  const state = {
    catalog: [],
    catalogById: new Map(),
    scrapedAt: null,
    pastedImage: null,
    rows: [],
    refImages: null,
  };

  const $ = (id) => document.getElementById(id);
  const apiKeyInput = $("api-key");
  const baseUrlInput = $("base-url");
  const modelInput = $("model");
  const forgetBtn = $("forget-key");
  const banner = $("freshness-banner");
  const pasteZone = $("paste-zone");
  const filePicker = $("file-picker");
  const thumbnail = $("thumbnail");
  const pasteMeta = $("paste-meta");
  const hintInput = $("hint");
  const computeBtn = $("compute");
  const statusEl = $("status");
  const resultsSection = $("results-section");
  const resultsBody = $("results-body");
  const totalCell = $("total-cell");
  const rawResponseDetails = $("raw-response");
  const rawResponsePre = $("raw-response-pre");

  init();

  function init() {
    apiKeyInput.value = localStorage.getItem(STORAGE_KEY_API) || "";
    baseUrlInput.value = localStorage.getItem(STORAGE_KEY_BASE) || "";
    modelInput.value = localStorage.getItem(STORAGE_KEY_MODEL) || "";

    const persist = (input, key) => input.addEventListener("change", () => {
      const v = input.value.trim();
      if (v) localStorage.setItem(key, v);
      else localStorage.removeItem(key);
    });
    persist(apiKeyInput, STORAGE_KEY_API);
    persist(baseUrlInput, STORAGE_KEY_BASE);
    persist(modelInput, STORAGE_KEY_MODEL);
    forgetBtn.addEventListener("click", () => {
      [STORAGE_KEY_API, STORAGE_KEY_BASE, STORAGE_KEY_MODEL].forEach((k) => localStorage.removeItem(k));
      apiKeyInput.value = ""; baseUrlInput.value = ""; modelInput.value = "";
      setStatus("已清除密钥 / Base URL / 模型", "");
    });

    loadCatalog();
    loadRefImages();
    bindImageInputs();
    computeBtn.addEventListener("click", onCompute);
  }

  // 加载目录：先尝试同目录 fetch（GitHub Pages 同源，能拿最新），失败回退内联
  async function loadCatalog() {
    try {
      const r = await fetch("./ammo_prices.json", { cache: "no-cache" });
      if (r.ok) {
        const data = await r.json();
        applyCatalog(data, "远端");
        return;
      }
    } catch {
      // file:// 或离线时 fetch 会失败，无所谓，下面回退
    }
    loadInlinedCatalog();
  }

  function applyCatalog(data, source) {
    state.catalog = data.items || [];
    state.scrapedAt = data.scraped_at || null;
    state.catalogById = new Map(state.catalog.map((it) => [it.id, it]));
    renderFreshnessBanner();
    setStatus(`目录就绪（${state.catalog.length} 条，${source}）`, "");
  }

  function loadRefImages() {
    try {
      const el = document.getElementById("ref-images");
      if (!el) return;
      state.refImages = JSON.parse(el.textContent);
    } catch (e) {
      console.warn("ref-images 加载失败：", e);
    }
  }

  function loadInlinedCatalog() {
    try {
      const raw = document.getElementById("ammo-data").textContent;
      const data = JSON.parse(raw);
      applyCatalog(data, "内联快照");
    } catch (err) {
      setStatus("内联目录解析失败：" + err.message, "error");
    }
  }

  function renderFreshnessBanner() {
    if (!state.scrapedAt) { banner.hidden = true; return; }
    const ts = new Date(state.scrapedAt);
    const ageMs = Date.now() - ts.getTime();
    const stale = ageMs > FRESHNESS_LIMIT_MS;
    const localStr = ts.toLocaleString("zh-CN");
    banner.hidden = false;
    banner.classList.toggle("warn", stale);
    if (stale) {
      const hours = Math.floor(ageMs / (60 * 60 * 1000));
      banner.textContent = `价格更新于 ${localStr}（已过 ${hours}h，建议在 orzice/ 目录运行 node scrape.mjs 刷新）`;
    } else {
      banner.textContent = `价格更新于 ${localStr}`;
    }
  }

  function bindImageInputs() {
    document.addEventListener("paste", async (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.kind === "file" && item.type.startsWith("image/")) {
          const file = item.getAsFile();
          if (file) { await acceptImage(file); e.preventDefault(); return; }
        }
      }
    });
    pasteZone.addEventListener("dragover", (e) => {
      e.preventDefault(); pasteZone.classList.add("dragover");
    });
    pasteZone.addEventListener("dragleave", () => pasteZone.classList.remove("dragover"));
    pasteZone.addEventListener("drop", async (e) => {
      e.preventDefault(); pasteZone.classList.remove("dragover");
      const file = e.dataTransfer?.files?.[0];
      if (file && file.type.startsWith("image/")) await acceptImage(file);
    });
    pasteZone.addEventListener("click", () => filePicker.click());
    pasteZone.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); filePicker.click(); }
    });
    filePicker.addEventListener("change", async () => {
      const file = filePicker.files?.[0];
      if (file) await acceptImage(file);
    });
  }

  async function acceptImage(file) {
    setStatus(`已读入 ${file.name || "(粘贴图)"}（${formatBytes(file.size)}）`, "");
    const dataUrl = await fileToDataUrl(file);
    const base64 = dataUrl.split(",")[1] || "";
    const mediaType = file.type || "image/png";
    state.pastedImage = { dataUrl, base64, mediaType, size: file.size };
    thumbnail.src = dataUrl;
    thumbnail.hidden = false;
    pasteMeta.textContent = `${file.name || "粘贴图"} · ${formatBytes(file.size)} · ${mediaType}`;
  }

  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
  }

  function formatBytes(n) {
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
    return `${(n / (1024 * 1024)).toFixed(2)} MB`;
  }

  async function onCompute() {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { setStatus("请先填写 API Key", "error"); apiKeyInput.focus(); return; }
    if (!state.pastedImage) { setStatus("请先粘贴 / 拖入截图", "error"); return; }
    if (state.catalog.length === 0) { setStatus("目录尚未加载完成", "error"); return; }

    computeBtn.disabled = true;
    setStatus("正在调用 Claude（首次会写缓存，后续会命中）…", "busy");
    rawResponseDetails.hidden = true;
    rawResponsePre.textContent = "";

    try {
      // 容错：去尾斜杠 + 去掉 /v1/messages、/v1/chat/completions、或单独的 /v1 后缀
      let normalizedBaseURL = (baseUrlInput.value.trim() || "https://api.anthropic.com")
        .replace(/\/+$/, "")
        .replace(/\/v1\/(messages|chat\/completions)$/i, "")
        .replace(/\/v1$/i, "");
      const response = await callModel({
        apiKey,
        baseURL: normalizedBaseURL,
        model: modelInput.value.trim() || DEFAULT_MODEL,
        image: state.pastedImage,
        hint: hintInput.value.trim(),
      });

      rawResponsePre.textContent = JSON.stringify(response.raw, null, 2);
      rawResponseDetails.hidden = false;

      if (!response.toolInput) {
        setStatus("API 返回格式异常（未找到工具调用），见下方原始响应", "error");
        rawResponseDetails.open = true;
        return;
      }

      const cells = response.toolInput.cells || [];
      if (cells.length === 0) {
        setStatus("模型未识别出弹药格" +
          (response.toolInput.image_notes ? `：${response.toolInput.image_notes}` : ""), "error");
        resultsSection.hidden = true;
        return;
      }

      state.rows = cells.map((cell) => buildRow(cell));
      renderResults();

      setStatus(`完成：识别 ${cells.length} 格 ${response.cacheNote}`, "");
    } catch (err) {
      console.error(err);
      setStatus("调用失败：" + (err?.message || String(err)), "error");
    } finally {
      computeBtn.disabled = false;
    }
  }

  // 通用调用：自动判断走 Anthropic 还是 OpenAI 兼容格式
  // - URL 含 anthropic.com 或路径里有 /anthropic → Anthropic 格式（/v1/messages）
  // - 否则 → OpenAI 格式（/v1/chat/completions）
  async function callModel({ apiKey, baseURL, model, image, hint }) {
    const isAnthropic = /api\.anthropic\.com/i.test(baseURL) || /\/anthropic($|\/)/i.test(baseURL);

    const instruction = [
      "你是子弹截图识别助手。任务：只识别游戏背包/交易截图里的【弹药格】（盒装子弹）。",
      "**忽略武器格、配件格、其他物品格** —— 这些格子不输出。",
      "",
      "每个弹药格里有：弹药盒图标 + 右下角数量数字。",
      "",
      "===【关键】等级判定规则===",
      "等级靠**格子背景色**判定（看格子四个角和边缘的颜色，不是中央图标的颜色）：",
      "  灰=1 / 绿=2 / 蓝=3 / 紫=4 / 金=5",
      "",
      "用户消息里前两张图是【参考样本】：第一张是紫色 grade 4 的标准背景，第二张是金色 grade 5 的标准背景。",
      "判定每个弹药格时，把它的背景色和这两个样本做颜色对比：",
      "- 紫色 = 偏冷、紫罗兰/品红、带蓝色调，**绝对不带黄色**",
      "- 金色 = 偏暖、黄/橙/琥珀，**绝对不带紫色或蓝色**",
      "拿不准时，用「暖冷判断」：暖色（黄/橙）→ 5 金；冷色（紫/蓝）→ 4 紫；都不像 → 看是不是 1/2/3。",
      "**绝对不要把紫色当成蓝色，也不要把金色当成绿色** —— 大多数游戏截图里只有紫(4)和金(5)。",
      "",
      "目录是真值（id/name/grade/current_price 的 JSON 数组）；只能返回目录里存在的 id。",
      "",
      "===【重要】口径识别规则===",
      "**弹药盒上的「003-24」「SE24-DDT」「5402」等是厂家批号、不是口径**——绝不能把它们当成口径返回（不要返回「7.62x24」「.300-24」这种瞎编的）。",
      "",
      "怎么读盒子上的真口径：",
      "- LASKITAN 大盒 → 盒身明确印着如「7.62 x.54 R」「5.56 x.45」，直接读这个数字就是口径。",
      "- TA9 003-24 盒 → 盒身**没有口径**，只有用途文字。看用途文字（位置在盒子右上区域，英文）：",
      "    · DESIGNATED MARKSMAN RIFLE / DMR → 7.62x39mm 系列",
      "    · RIFLE → 步枪弹（看不出具体口径就猜 5.56x45mm 或 7.62x39mm）",
      "    · SUBMACHINE GUN / SMG → 冲锋枪弹（9x19mm 或 .45 ACP）",
      "    · HANDGUN → 手枪弹（.357 Magnum 或 .50 AE）",
      "    · SHOTGUN → 12 Gauge",
      "",
      "返回 detected_caliber 时：",
      "- 如果盒身明确印了口径（LASKITAN 大盒），返回该口径字符串（如 7.62x54R）。",
      "- 如果是 TA9 盒看不出具体口径，返回上面表里的**家族口径**（如手枪盒返回 .357 Magnum 或 .50 AE，二选一即可——浏览器后处理会按图标 + 等级取最低价）。",
      "- **必须**填 candidate_id：从目录里挑一个名字含你判断的口径、grade 等于检测等级、current_price > 0 的最便宜项的 id 作为兜底。",
      "",
      "===【最高优先级】用户颜色提示规则===",
      "用户可能在末尾给 hint，hint 是空格分隔的颜色词序列（如 \"金 紫 紫\"）。",
      "颜色词到等级：灰/白=1, 绿=2, 蓝=3, 紫=4, 金/黄=5。",
      "hint 按【弹药格】顺序（左→右、上→下）对应——武器/其他格不算入序列。",
      "**hint 强制覆盖**你对背景色的判断；对应到的格子 detected_grade_source 设为 \"hint\"。",
      "hint 不够长时，剩余格子用颜色 + 参考样本对比自动判定，detected_grade_source 设为 \"color\"。",
      "==========================================",
      "",
      "输出必须只通过 `report_cells` 工具调用 —— 不要 prose / markdown / 解释。",
      "cell_index 从 1 开始，按【弹药格】顺序编号（不要把武器格算进去）。",
    ].join("\n");

    const catalogText = "目录（id/name/grade/current_price）：\n" + JSON.stringify(state.catalog);

    const toolSchema = {
      type: "object",
      properties: {
        cells: {
          type: "array",
          description: "每个识别到的弹药格",
          items: {
            type: "object",
            properties: {
              cell_index: { type: "integer", description: "1 起的格序" },
              detected_caliber: { type: "string", description: "识别到的口径文字" },
              detected_grade: { type: "integer", minimum: 1, maximum: 5 },
              detected_grade_source: { type: "string", enum: ["color", "hint", "both"] },
              quantity: { type: "integer", description: "右下角数量" },
              candidate_id: { type: "integer" },
              confidence: { type: "string", enum: ["high", "medium", "low"] },
              notes: { type: "string" },
            },
            required: ["cell_index", "detected_caliber", "detected_grade", "quantity"],
          },
        },
        image_notes: { type: "string" },
      },
      required: ["cells"],
    };

    const userText = `提示（左到右等级颜色，可空）：${hint || "（无）"}`;

    // 构造用户消息内容：先放两张参考样本（紫/金），再放实际截图
    const refs = state.refImages || {};
    const buildAnthropicContent = () => {
      const arr = [];
      if (refs.purple) {
        arr.push({ type: "image", source: { type: "base64", media_type: "image/png", data: refs.purple } });
        arr.push({ type: "text", text: "↑ 这是【紫色 grade 4】背景的参考样本（冷色调，紫罗兰/品红）。" });
      }
      if (refs.gold) {
        arr.push({ type: "image", source: { type: "base64", media_type: "image/png", data: refs.gold } });
        arr.push({ type: "text", text: "↑ 这是【金色 grade 5】背景的参考样本（暖色调，金黄/琥珀）。" });
      }
      arr.push({ type: "image", source: { type: "base64", media_type: image.mediaType, data: image.base64 } });
      arr.push({ type: "text", text: "↑ 这是要分析的截图。请把每个弹药格的背景色与上面两个样本对比来判定 grade。\n" + userText });
      return arr;
    };
    const buildOpenAIContent = () => {
      const arr = [];
      if (refs.purple) {
        arr.push({ type: "image_url", image_url: { url: "data:image/png;base64," + refs.purple } });
        arr.push({ type: "text", text: "↑ 这是【紫色 grade 4】背景的参考样本（冷色调，紫罗兰/品红）。" });
      }
      if (refs.gold) {
        arr.push({ type: "image_url", image_url: { url: "data:image/png;base64," + refs.gold } });
        arr.push({ type: "text", text: "↑ 这是【金色 grade 5】背景的参考样本（暖色调，金黄/琥珀）。" });
      }
      arr.push({ type: "image_url", image_url: { url: `data:${image.mediaType};base64,${image.base64}` } });
      arr.push({ type: "text", text: "↑ 这是要分析的截图。请把每个弹药格的背景色与上面两个样本对比来判定 grade。\n" + userText });
      return arr;
    };

    let url, headers, body;

    if (isAnthropic) {
      url = baseURL + "/v1/messages";
      headers = { "anthropic-version": "2023-06-01", "content-type": "application/json" };
      // 官方 Anthropic：x-api-key + 浏览器开关；中转：Bearer
      if (/api\.anthropic\.com/i.test(baseURL)) {
        headers["x-api-key"] = apiKey;
        headers["anthropic-dangerous-direct-browser-access"] = "true";
      } else {
        headers["Authorization"] = "Bearer " + apiKey;
      }
      body = {
        model, max_tokens: 4096,
        system: [
          { type: "text", text: instruction },
          { type: "text", text: catalogText, cache_control: { type: "ephemeral" } },
        ],
        tools: [{ name: "report_cells", description: "返回截图里识别到的弹药格列表", input_schema: toolSchema }],
        tool_choice: { type: "tool", name: "report_cells" },
        messages: [{ role: "user", content: buildAnthropicContent() }],
      };
    } else {
      // OpenAI 兼容
      url = baseURL + "/v1/chat/completions";
      headers = { Authorization: "Bearer " + apiKey, "content-type": "application/json" };
      body = {
        model, max_tokens: 4096,
        messages: [
          { role: "system", content: instruction + "\n\n" + catalogText },
          { role: "user", content: buildOpenAIContent() },
        ],
        tools: [{ type: "function", function: { name: "report_cells", description: "返回截图里识别到的弹药格列表", parameters: toolSchema } }],
        tool_choice: { type: "function", function: { name: "report_cells" } },
      };
    }

    const r = await fetch(url, { method: "POST", headers, body: JSON.stringify(body) });
    if (!r.ok) {
      let errBody = "";
      try { errBody = JSON.stringify(await r.json()); } catch { errBody = await r.text(); }
      throw new Error(`HTTP ${r.status}: ${errBody.slice(0, 500)}`);
    }
    const raw = await r.json();

    // 解析两种格式的工具输出
    let toolInput = null, cacheNote = "";
    if (isAnthropic) {
      const tu = raw.content?.find((b) => b.type === "tool_use");
      if (tu) toolInput = tu.input;
      const u = raw.usage || {};
      cacheNote = u.cache_read_input_tokens
        ? `（缓存命中 ${u.cache_read_input_tokens} tok）`
        : u.cache_creation_input_tokens
          ? `（已写入缓存 ${u.cache_creation_input_tokens} tok）` : "";
    } else {
      const call = raw.choices?.[0]?.message?.tool_calls?.[0];
      if (call?.function?.arguments) {
        try { toolInput = JSON.parse(call.function.arguments); } catch (e) {
          throw new Error("工具调用参数解析失败：" + e.message);
        }
      }
      const u = raw.usage || {};
      cacheNote = u.prompt_tokens_details?.cached_tokens
        ? `（缓存命中 ${u.prompt_tokens_details.cached_tokens} tok）` : "";
    }

    return { raw, toolInput, cacheNote };
  }

  function pickItem(catalog, detectedCaliber, detectedGrade) {
    const cal = (detectedCaliber || "").toLowerCase().trim();
    if (!cal) return null;
    const candidates = catalog.filter(
      (i) =>
        i.name.toLowerCase().includes(cal) &&
        i.grade === detectedGrade &&
        i.current_price > 0
    );
    if (candidates.length === 0) return null;
    return candidates.reduce((a, b) => (a.current_price < b.current_price ? a : b));
  }

  // 构造匹配下拉框：列出当前等级所有弹药（按价格升序），用户可手动改
  function buildMatchSelect(row, tr) {
    const select = document.createElement("select");
    select.className = "match-select";

    // "未识别"占位（disabled）
    const ph = document.createElement("option");
    ph.value = "";
    ph.textContent = `未识别 [${row.detectedCaliber || "?"} · ${GRADE_LABELS[row.detectedGrade]}]`;
    ph.disabled = true;
    if (!row.matched) ph.selected = true;
    select.appendChild(ph);

    // 当前等级所有弹药，按价格升序
    const sameGrade = state.catalog
      .filter((i) => i.grade === row.detectedGrade && i.current_price > 0)
      .sort((a, b) => a.current_price - b.current_price);

    for (const it of sameGrade) {
      const opt = document.createElement("option");
      opt.value = String(it.id);
      opt.textContent = `${it.name} · ${priceFormatter.format(it.current_price)}`;
      if (row.matched?.id === it.id) opt.selected = true;
      select.appendChild(opt);
    }

    select.addEventListener("change", () => {
      const id = parseInt(select.value, 10);
      const item = state.catalogById.get(id);
      row.matched = item || null;
      // 局部刷新即可，不必整表重渲染
      const priceCell = tr?.querySelector("td:nth-child(4)");
      const subCell = tr?.querySelector(".subtotal");
      if (priceCell) priceCell.textContent = row.matched ? priceFormatter.format(row.matched.current_price) : "—";
      if (subCell) subCell.textContent = formatSubtotal(row);
      updateTotal();
    });

    return select;
  }

  function buildRow(cell) {
    const detectedGrade = clampGrade(cell.detected_grade);
    let matched = pickItem(state.catalog, cell.detected_caliber, detectedGrade);
    if (!matched && cell.candidate_id) {
      const fallback = state.catalogById.get(cell.candidate_id);
      if (fallback && fallback.current_price > 0) matched = fallback;
    }
    return {
      cellIndex: cell.cell_index,
      detectedCaliber: cell.detected_caliber || "",
      detectedGrade,
      quantity: Math.max(0, Math.floor(cell.quantity || 0)),
      matched,
      notes: cell.notes || "",
      confidence: cell.confidence || "",
    };
  }

  function clampGrade(g) {
    const n = Number(g);
    if (!Number.isFinite(n)) return 1;
    return Math.min(5, Math.max(1, Math.floor(n)));
  }

  function renderResults() {
    resultsSection.hidden = false;
    resultsBody.innerHTML = "";

    state.rows.forEach((row, idx) => {
      const tr = document.createElement("tr");
      if (!row.matched) tr.classList.add("unmatched");

      const tdIdx = document.createElement("td");
      tdIdx.textContent = String(row.cellIndex ?? idx + 1);
      tr.appendChild(tdIdx);

      const tdMatch = document.createElement("td");
      tdMatch.appendChild(buildMatchSelect(row, tr));
      if (row.notes) tdMatch.title = row.notes;
      tr.appendChild(tdMatch);

      const tdGrade = document.createElement("td");
      const select = document.createElement("select");
      for (let g = 1; g <= 5; g++) {
        const opt = document.createElement("option");
        opt.value = String(g);
        opt.textContent = `${g} ${GRADE_LABELS[g]}`;
        if (g === row.detectedGrade) opt.selected = true;
        select.appendChild(opt);
      }
      select.addEventListener("change", () => {
        row.detectedGrade = clampGrade(select.value);
        row.matched = pickItem(state.catalog, row.detectedCaliber, row.detectedGrade) || null;
        renderResults();
      });
      const badge = document.createElement("span");
      badge.className = `grade-badge g${row.detectedGrade}`;
      badge.textContent = GRADE_LABELS[row.detectedGrade];
      tdGrade.appendChild(badge);
      tdGrade.appendChild(select);
      tr.appendChild(tdGrade);

      const tdPrice = document.createElement("td");
      tdPrice.classList.add("numeric");
      tdPrice.textContent = row.matched ? priceFormatter.format(row.matched.current_price) : "—";
      tr.appendChild(tdPrice);

      const tdQty = document.createElement("td");
      tdQty.classList.add("numeric");
      const qtyInput = document.createElement("input");
      qtyInput.type = "number"; qtyInput.min = "0"; qtyInput.step = "1";
      qtyInput.value = String(row.quantity);
      qtyInput.addEventListener("input", () => {
        row.quantity = Math.max(0, Math.floor(Number(qtyInput.value) || 0));
        updateSubtotal(tr, row);
        updateTotal();
      });
      tdQty.appendChild(qtyInput);
      tr.appendChild(tdQty);

      const tdSub = document.createElement("td");
      tdSub.classList.add("numeric", "subtotal");
      tdSub.textContent = formatSubtotal(row);
      tr.appendChild(tdSub);

      resultsBody.appendChild(tr);
    });

    updateTotal();
  }

  function subtotal(row) {
    if (!row.matched) return 0;
    return row.matched.current_price * row.quantity;
  }
  function formatSubtotal(row) {
    if (!row.matched) return "—";
    return priceFormatter.format(subtotal(row));
  }
  function updateSubtotal(tr, row) {
    const cell = tr.querySelector(".subtotal");
    if (cell) cell.textContent = formatSubtotal(row);
  }
  function updateTotal() {
    const total = state.rows.reduce((acc, r) => acc + subtotal(r), 0);
    totalCell.textContent = priceFormatter.format(total);
  }

  function setStatus(msg, kind) {
    statusEl.textContent = msg || "";
    statusEl.classList.remove("error", "busy");
    if (kind) statusEl.classList.add(kind);
  }
})();
</script>
</body>
</html>
